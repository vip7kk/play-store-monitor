name: Play Store Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      first_run:
        description: '首次运行？通知所有应用当前状态'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore previous state
        uses: actions/cache@v4
        with:
          path: state.json
          key: play-monitor-state-${{ github.run_number }}
          restore-keys: |
            play-monitor-state-

      - name: Run monitor (normal)
        if: github.event.inputs.first_run != 'true'
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GH_CONFIG_URL: ${{ secrets.GH_CONFIG_URL }}
          MONITOR_LANG: ${{ vars.MONITOR_LANG }}
          MONITOR_COUNTRY: ${{ vars.MONITOR_COUNTRY }}
        run: python play_monitor.py

      - name: Run monitor (first run)
        if: github.event.inputs.first_run == 'true'
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GH_CONFIG_URL: ${{ secrets.GH_CONFIG_URL }}
          MONITOR_LANG: ${{ vars.MONITOR_LANG }}
          MONITOR_COUNTRY: ${{ vars.MONITOR_COUNTRY }}
        run: python play_monitor.py --first-run

      - name: Save state for next run
        if: always()
        run: |
          if [ -f state.json ]; then
            echo "State file saved successfully"
            cat state.json
          fi
